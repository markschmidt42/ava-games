<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories Party Game</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#1f2435;
    color:white;
}

header{
    background:#304a8d;
    text-align:center;
    padding:10px;
}

h1{
    margin:0;
}

#letterBox{
    text-align:center;
    margin:8px;
}

#letterBox h2{
    margin:0 0 2px;
    font-size:18px;
}

#letter{
    font-size:clamp(56px,8vh,90px);
    line-height:1;
    font-weight:bold;
    color:#ffd54a;
}

#timer{
    text-align:center;
    margin:4px 25px;
    font-size:clamp(28px,4vh,34px);
    font-weight:bold;
    color:#ffd54a;
}

#board{
    display:grid;
    grid-template-columns:1fr;
    gap:6px 12px;
    max-width:1200px;
    margin:0 auto;
    padding:0 14px 16px;
    list-style:none;
}

.card{
    background:#364869;
    border-radius:12px;
    padding:8px 12px;
    margin:0;
    min-height:42px;
    display:flex;
    align-items:center;
    font-size:clamp(16px,2.2vw,22px);
    font-weight:bold;
}

.category-number{
    color:#ffd54a;
    font-size:clamp(16px,2.2vw,22px);
    font-weight:bold;
    min-width:32px;
    text-align:right;
    margin-right:10px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    padding:8px;
}

button{
    background:#4d73ff;
    color:white;
    border:none;
    border-radius:10px;
    padding:8px 14px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#365de8;
}

#players{
    padding:20px;
}

.player{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0;
}

.player input[type=text]{
    width:160px;
    padding:8px;
}

.score{
    width:60px;
    text-align:center;
    font-size:18px;
}

footer{
    text-align:center;
    padding:12px;
    opacity:.75;
}

@media (min-width:620px){
    #board{ grid-template-columns:repeat(2,minmax(0,1fr)); }
}

:fullscreen #board{
    max-width:1500px;
}

@media (min-width:1000px){
    :fullscreen #board{ grid-template-columns:repeat(3,minmax(0,1fr)); }
}
</style>

</head>
<body>

<header>
<h1>🎲 Categories Party Game</h1>
</header>

<div id="letterBox">
<h2>Your Letter</h2>
<div id="letter">A</div>
</div>

<div id="timer" aria-live="polite">3:00</div>

<div class="controls">
<button onclick="newRound()">🎲 New Round</button>
<button onclick="startTimer()">Start 3-Minute Timer</button>
<button onclick="enterFullscreen()">Fullscreen</button>
<button onclick="resetScores()">Reset Scores</button>
</div>

<ol id="board"></ol>

<div id="players">
<h2>Players</h2>

<button onclick="addPlayer()">
Add Player
</button>

<div id="playerList"></div>

</div>

<footer>
Answer every category using the letter above!
</footer>

<script>

const letters=[
"A","B","C","D","E","F","G","H","J","K","L","M","N","P","R","S","T","W"
];

const categories=[

"Boy's Name",
"Girl's Name",
"Animal",
"Pet",
"Bird",
"Fish",
"Insect",
"Country",
"State",
"Capital City",
"City",
"Fruit",
"Vegetable",
"Food",
"Dessert",
"Candy",
"Restaurant",
"Drink",
"Coffee Drink",
"Ice Cream Flavor",
"Pizza Topping",
"Breakfast Food",
"Snack",
"Movie",
"TV Show",
"Book",
"Author",
"Song",
"Singer",
"Band",
"Musical Instrument",
"Celebrity",
"Actor",
"Actress",
"Cartoon Character",
"Disney Character",
"Pixar Character",
"Superhero",
"Villain",
"Video Game",
"Board Game",
"Card Game",
"Toy",
"Sport",
"Sports Team",
"Olympic Sport",
"School Subject",
"Occupation",
"College Major",
"Language",
"Color",
"Shape",
"Planet",
"Flower",
"Tree",
"Plant",
"Gemstone",
"Metal",
"Weather",
"Holiday",
"Season",
"Month",
"App",
"Website",
"Brand",
"Car Brand",
"Phone Brand",
"Computer Brand",
"Clothing Brand",
"Shoe Brand",
"Store",
"Kitchen Item",
"Bathroom Item",
"Bedroom Item",
"Garage Item",
"Office Supply",
"Tool",
"Furniture",
"Appliance",
"Something Cold",
"Something Hot",
"Something Soft",
"Something Hard",
"Something Sticky",
"Something Sweet",
"Something Sour",
"Something Loud",
"Something Quiet",
"Something That Flies",
"Something That Swims",
"Something That Rolls",
"Something You Wear",
"Something You Eat",
"Something You Drink",
"Something Green",
"Something Blue",
"Something Red",
"Something Yellow",
"Something Made of Wood",
"Something Made of Metal",
"Something Expensive",
"Something Cheap",
"Something Found at School",
"Something Found at the Beach",
"Something Found in a Park",
"Something Found in a Hospital",
"Something Found at the Mall",
"Something Found in Space"

];

let players=[];
let timerId;
let remainingSeconds = 180;

function updateTimer() {
    const minutes = Math.floor(remainingSeconds / 60);
    const seconds = remainingSeconds % 60;
    document.getElementById("timer").innerText = `${minutes}:${seconds.toString().padStart(2, "0")}`;
}

function startTimer() {
    clearInterval(timerId);
    remainingSeconds = 180;
    updateTimer();

    timerId = setInterval(() => {
        remainingSeconds--;
        updateTimer();

        if (remainingSeconds === 0) {
            clearInterval(timerId);
        }
    }, 1000);
}

function enterFullscreen() {
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        document.documentElement.requestFullscreen();
    }
}

function newRound() {
    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
    document.getElementById("letter").innerText = randomLetter;

    const shuffledCategories = [...categories].sort(() => 0.5 - Math.random());
    const selectedCategories = shuffledCategories.slice(0, 12);

    const board = document.getElementById("board");
    board.innerHTML = "";
    
    selectedCategories.forEach((cat, index) => {
        const card = document.createElement("li");
        card.className = "card";
        const number = document.createElement("span");
        number.className = "category-number";
        number.innerText = `${index + 1}.`;
        card.appendChild(number);
        card.appendChild(document.createTextNode(cat));
        board.appendChild(card);
    });

    startTimer();
}

function addPlayer() {
    const playerIndex = players.length;
    players.push({ name: `Player ${playerIndex + 1}`, score: 0 });

    renderPlayers();
}

function renderPlayers() {
    const playerList = document.getElementById("playerList");
    playerList.innerHTML = "";

    players.forEach((player, index) => {
        const playerDiv = document.createElement("div");
        playerDiv.className = "player";

        playerDiv.innerHTML = `
            <input type="text" value="${player.name}" onchange="updatePlayerName(${index}, this.value)">
            <input type="number" class="score" value="${player.score}" onchange="updatePlayerScore(${index}, this.value)">
            <button onclick="removePlayer(${index})" style="background:#e74c3c; padding:8px 12px;">✕</button>
        `;

        playerList.appendChild(playerDiv);
    });
}

function updatePlayerName(index, name) {
    players[index].name = name;
}

function updatePlayerScore(index, score) {
    players[index].score = parseInt(score) || 0;
}

function removePlayer(index) {
    players.splice(index, 1);
    renderPlayers();
}

function resetScores() {
    players.forEach(p => p.score = 0);
    renderPlayers();
}

window.onload = function() {
    addPlayer();
    addPlayer();
    newRound();
};

</script>
</body>
</html>
